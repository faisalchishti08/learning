<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Security — Every Micro-Topic Checklist</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2430; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e; --accent:#6db33f; --accent2:#34804f;
    --done:#3fb950; --bar-bg:#21262d; --chip:#21262d;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
  }
  header{
    position:sticky; top:0; z-index:50; background:rgba(13,17,23,.92);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--border); padding:14px 20px;
  }
  .title{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .title h1{font-size:20px; margin:0}
  .home{font-size:13px; color:var(--muted); text-decoration:none; border:1px solid var(--border); padding:5px 10px; border-radius:8px}
  .home:hover{border-color:var(--accent); color:var(--text)}
  .logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));
        display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
  .stats{margin-left:auto; font-size:13px; color:var(--muted)}
  .stats b{color:var(--accent)}
  .sub{margin:6px 0 0; font-size:13px; color:var(--muted)}
  .progress-wrap{margin-top:10px; display:flex; align-items:center; gap:12px}
  .bar{flex:1; height:10px; background:var(--bar-bg); border-radius:99px; overflow:hidden}
  .bar > span{display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--done)); transition:width .35s}
  .pct{font-size:13px; color:var(--muted); min-width:42px; text-align:right}
  .toolbar{margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center}
  .toolbar input[type=search]{
    flex:1; min-width:180px; background:var(--panel2); border:1px solid var(--border); color:var(--text);
    padding:8px 12px; border-radius:8px; font-size:14px;
  }
  button{
    background:var(--chip); border:1px solid var(--border); color:var(--text);
    padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer;
  }
  button:hover{border-color:var(--accent)}
  .danger:hover{border-color:#f85149; color:#f85149}
  main{max-width:1040px; margin:0 auto; padding:20px}
  .toc{
    background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px 18px; margin-bottom:22px;
  }
  .toc h2{margin:0 0 10px; font-size:15px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .toc ul{list-style:none; margin:0; padding:0; columns:2; column-gap:24px}
  .toc li{margin:4px 0; break-inside:avoid}
  .toc a{color:var(--text); text-decoration:none; font-size:14px}
  .toc a:hover{color:var(--accent)}
  .toc .mini{color:var(--muted); font-size:12px}
  @media(max-width:640px){.toc ul{columns:1}}

  section.sec{margin-bottom:18px; border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--panel)}
  .sec-head{
    display:flex; align-items:center; gap:12px; padding:14px 18px; cursor:pointer; user-select:none;
    background:var(--panel2);
  }
  .sec-head:hover{background:#222b38}
  .sec-head .vname{font-size:16px; font-weight:700}
  .sec-head .vtag{font-size:11px; color:var(--muted); background:var(--bar-bg); padding:2px 8px; border-radius:99px}
  .sec-head .vcount{margin-left:auto; font-size:12px; color:var(--muted)}
  .sec-head .chev{transition:transform .2s; color:var(--muted)}
  section.sec.collapsed .chev{transform:rotate(-90deg)}
  section.sec.collapsed .sec-body{display:none}
  .sec-body{padding:6px 10px 14px}
  .grp{margin:14px 8px 4px; font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--accent); font-weight:700;
       border-top:1px solid var(--border); padding-top:12px}
  .grp:first-child{border-top:none; padding-top:4px}
  ul.topics{list-style:none; margin:0; padding:0}
  li.topic{
    display:flex; align-items:flex-start; gap:10px; padding:6px 10px; border-radius:8px;
  }
  li.topic:hover{background:var(--panel2)}
  li.topic input{margin-top:3px; width:16px; height:16px; accent-color:var(--done); cursor:pointer; flex:none}
  li.topic .idx{color:var(--muted); font-variant-numeric:tabular-nums; font-size:13px; min-width:52px; flex:none}
  li.topic label{cursor:pointer; font-size:14.5px}
  li.topic.done label{color:var(--muted); text-decoration:line-through}
  li.topic .tlink{color:var(--text);text-decoration:none;border-bottom:1px dotted var(--accent);font-size:14.5px}
  li.topic .tlink:hover{color:var(--accent)}
  li.topic .pin{font-size:11px;opacity:.55;flex:none}
  li.topic.done .tlink{color:var(--muted);text-decoration:line-through}
  code{background:var(--bar-bg); padding:1px 5px; border-radius:5px; font-size:13px; color:#79c0ff}
  .hidden{display:none !important}
  footer{text-align:center; color:var(--muted); font-size:12px; padding:24px}
  .back-top{position:fixed; right:18px; bottom:18px; opacity:.85}
</style>
</head>
<body>
<header>
  <div class="title">
    <div class="logo">S</div>
    <h1>Spring Security</h1>
    <a class="home" href="index.html">All projects ↗</a>
    <div class="stats"><b id="doneCount">0</b> / <span id="totalCount">0</span> topics</div>
  </div>
  <p class="sub">Authentication, authorization, and protection against common attacks.</p>
  <div class="progress-wrap">
    <div class="bar"><span id="barFill"></span></div>
    <div class="pct" id="pctLabel">0%</div>
  </div>
  <div class="toolbar">
    <input type="search" id="search" placeholder="Search topics…">
    <button id="expandAll">Expand all</button>
    <button id="collapseAll">Collapse all</button>
    <button id="hideDone">Hide done</button>
    <button id="reset" class="danger">Reset progress</button>
  </div>
</header>

<main>
  <div class="toc">
    <h2>Index — jump to section</h2>
    <ul id="tocList"></ul>
  </div>
  <div id="content"></div>
  <footer>
    Progress saved automatically in your browser (localStorage). Single self-contained file — works offline.
  </footer>
</main>
<button class="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Top</button>

<script>
const STORAGE_KEY = "spring-checklist:spring-security.html";
const DATA = [
{
"name": "1. Architecture & Fundamentals",
"tag": "core",
"groups": [
{
"g": "Concepts",
"items": [
"What Spring Security is & its goals",
"Authentication vs authorization",
"Servlet vs reactive (WebFlux) support",
"Filters & the FilterChainProxy / DelegatingFilterProxy",
"SecurityFilterChain",
"Security filter ordering (full chain)",
"SecurityContext & SecurityContextHolder",
"SecurityContextHolderStrategy",
"Authentication object & Principal",
"GrantedAuthority",
"AuthenticationManager / ProviderManager",
"AuthenticationProvider",
"AuthenticationEntryPoint",
"AbstractAuthenticationProcessingFilter",
"Handling security exceptions (ExceptionTranslationFilter)",
"SecurityContextRepository / persistence"
]
},
{
"g": "Configuration",
"items": [
"Java config (@EnableWebSecurity)",
"SecurityFilterChain bean (lambda DSL)",
"HttpSecurity DSL",
"Multiple security filter chains",
"WebSecurityCustomizer (ignoring requests)",
"@EnableMethodSecurity",
"Migrating from WebSecurityConfigurerAdapter (deprecated)",
"Default security (auto-config) behavior"
]
}
]
},
{
"name": "2. Authentication",
"tag": "authn",
"groups": [
{
"g": "Mechanisms",
"items": [
"Username/password authentication",
"Form login",
"HTTP Basic authentication",
"HTTP Digest (legacy)",
"Remember-me authentication (token & persistent)",
"Anonymous authentication",
"Pre-authentication scenarios (X.509, SiteMinder, J2EE)",
"Run-as authentication replacement",
"Logout handling",
"Concurrent session control",
"Session management & fixation protection",
"Saved requests & redirect after login",
"One-Time Token login",
"Passkeys / WebAuthn"
]
},
{
"g": "Password & User Storage",
"items": [
"PasswordEncoder (BCrypt, Argon2, SCrypt, PBKDF2, delegating)",
"DelegatingPasswordEncoder & {id} format",
"Password storage history & upgrades",
"UserDetails & UserDetailsService",
"InMemoryUserDetailsManager",
"JdbcUserDetailsManager",
"UserDetailsPasswordService (password upgrade)",
"DaoAuthenticationProvider",
"AuthenticationManagerBuilder",
"Custom AuthenticationProvider",
"Account status (locked, expired, disabled)",
"Compromised password checking (HaveIBeenPwned)"
]
},
{
"g": "Events & Details",
"items": [
"Authentication events (success/failure listeners)",
"AuthenticationDetailsSource",
"Credentials erasure",
"Custom AuthenticationSuccessHandler/FailureHandler"
]
}
]
},
{
"name": "3. Authorization",
"tag": "authz",
"groups": [
{
"g": "Request Authorization",
"items": [
"AuthorizationManager",
"authorizeHttpRequests DSL",
"Request matchers (Ant, MVC, regex, path)",
"Authorities & roles (hasRole, hasAuthority, hasAnyRole)",
"Access expressions & WebExpressionAuthorizationManager",
"AccessDecisionManager / Voter (legacy)",
"Secured object & ConfigAttribute (legacy)",
"Hierarchical roles (RoleHierarchy)",
"Authorization events (AuthorizationDeniedEvent/GrantedEvent)"
]
},
{
"g": "Method Security",
"items": [
"@PreAuthorize / @PostAuthorize",
"@PreFilter / @PostFilter",
"@Secured (legacy)",
"JSR-250 (@RolesAllowed, @PermitAll, @DenyAll)",
"Method security SpEL expressions",
"Custom security expressions (MethodSecurityExpressionHandler)",
"AuthorizationManager for methods",
"@AuthenticationPrincipal",
"Meta-annotations for method security",
"Securing domain objects (ACLs)",
"ACL model (Acl, Sid, Permission, AclService)"
]
}
]
},
{
"name": "4. Protection Against Exploits",
"tag": "exploits",
"groups": [
{
"g": "Common Protections",
"items": [
"CSRF protection (CsrfToken, CsrfTokenRepository)",
"CSRF with SPA / cookie-based token",
"Security HTTP response headers (HSTS, X-Frame-Options, CSP, etc.)",
"Content Security Policy",
"Referrer Policy / Feature Policy / Permissions Policy",
"Clickjacking protection (frame options)",
"HTTP Strict Transport Security",
"Cache control headers",
"Content-Type sniffing protection",
"CORS support (cors DSL & CorsConfigurationSource)",
"HTTP requirements / channel security (requiresChannel HTTPS)",
"HttpFirewall & StrictHttpFirewall",
"Encoding / Firewall request validation"
]
}
]
},
{
"name": "5. OAuth2 & OpenID Connect",
"tag": "oauth2",
"groups": [
{
"g": "OAuth2 Login & Client",
"items": [
"OAuth2 Login (social login)",
"ClientRegistration & ClientRegistrationRepository",
"Authorization Code grant flow",
"OAuth2AuthorizedClient & repository/service",
"OAuth2 client (WebClient/RestClient integration)",
"Authorized client manager & providers",
"Refresh token / client credentials / etc. grants",
"OpenID Connect 1.0 login",
"OIDC user info & ID token",
"OIDC logout (RP-initiated)",
"Custom user types (OAuth2User/OidcUser)"
]
},
{
"g": "Resource Server",
"items": [
"OAuth2 Resource Server",
"JWT-based (bearer token) authentication",
"JwtDecoder & JWK set",
"Opaque token introspection",
"Validating audience/issuer/claims",
"Mapping authorities from claims (JwtAuthenticationConverter)",
"Multi-tenancy (multiple issuers)",
"Bearer token resolution"
]
}
]
},
{
"name": "6. SAML2 & LDAP & Integrations",
"tag": "integ",
"groups": [
{
"g": "SAML2 / LDAP",
"items": [
"SAML2 login (service provider)",
"RelyingPartyRegistration",
"SAML2 logout",
"Asserting party metadata",
"LDAP authentication (BindAuthenticator)",
"LDAP authorities population",
"Embedded LDAP server for testing",
"Active Directory authentication"
]
},
{
"g": "Reactive & Other",
"items": [
"Reactive (WebFlux) security (@EnableWebFluxSecurity)",
"ReactiveSecurityContextHolder",
"ServerHttpSecurity DSL",
"Reactive method security",
"WebSocket security",
"RSocket security",
"CAS authentication",
"Spring MVC integration (CurrentSecurityContextArgumentResolver)",
"Jackson support (serializing security context)",
"Localization of messages",
"Observability (Micrometer) in security"
]
}
]
},
{
"name": "7. Testing",
"tag": "testing",
"groups": [
{
"g": "Test Support",
"items": [
"spring-security-test dependency",
"@WithMockUser",
"@WithAnonymousUser",
"@WithUserDetails",
"@WithSecurityContext (custom)",
"SecurityMockMvcRequestPostProcessors (user, csrf, httpBasic, etc.)",
"SecurityMockMvcResultMatchers (authenticated, etc.)",
"MockMvc form login / logout",
"WebTestClient security (mutateWith)",
"Testing OAuth2 (mockJwt, mockOpaqueToken, oauth2Login)",
"Testing method security"
]
}
]
}
];
const LINKS = {"1": "tutorials/spring-security/0001-what-spring-security-is-its-goals.html", "2": "tutorials/spring-security/0002-authentication-vs-authorization.html", "3": "tutorials/spring-security/0003-servlet-vs-reactive-webflux-support.html", "4": "tutorials/spring-security/0004-filters-the-filterchainproxy-delegatingfilterproxy.html", "5": "tutorials/spring-security/0005-securityfilterchain.html", "6": "tutorials/spring-security/0006-security-filter-ordering-full-chain.html", "7": "tutorials/spring-security/0007-securitycontext-securitycontextholder.html", "8": "tutorials/spring-security/0008-securitycontextholderstrategy.html", "9": "tutorials/spring-security/0009-authentication-object-principal.html", "10": "tutorials/spring-security/0010-grantedauthority.html", "11": "tutorials/spring-security/0011-authenticationmanager-providermanager.html", "12": "tutorials/spring-security/0012-authenticationprovider.html"};

const $ = (s,el=document)=>el.querySelector(s);
const content = $("#content");
const tocList = $("#tocList");
let state = {};
try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch(e){ state = {}; }

let totalTopics = 0;
let gi = 0; // global sequential index

DATA.forEach((sec, si)=>{
  let secCount = 0;
  DATA[si]._items = [];
  sec.groups.forEach(grp => grp.items.forEach(()=>{ secCount++; }));
  DATA[si]._count = secCount;
  totalTopics += secCount;
});

// TOC
DATA.forEach((sec, si)=>{
  const li = document.createElement("li");
  li.innerHTML = `<a href="#sec-${si}">${sec.name}</a> <span class="mini">(${sec._count})</span>`;
  tocList.appendChild(li);
});

// Sections
DATA.forEach((sec, si)=>{
  const section = document.createElement("section");
  section.className = "sec";
  section.id = `sec-${si}`;

  const head = document.createElement("div");
  head.className = "sec-head";
  head.innerHTML = `
    <span class="chev">▾</span>
    <span class="vname">${sec.name}</span>
    ${sec.tag ? `<span class="vtag">${sec.tag}</span>` : ""}
    <span class="vcount" data-secdone>0 / ${sec._count}</span>`;
  head.addEventListener("click", ()=> section.classList.toggle("collapsed"));
  section.appendChild(head);

  const body = document.createElement("div");
  body.className = "sec-body";

  sec.groups.forEach(grp=>{
    const g = document.createElement("div");
    g.className = "grp";
    g.textContent = grp.g;
    body.appendChild(g);

    const ul = document.createElement("ul");
    ul.className = "topics";
    grp.items.forEach(text=>{
      gi++;
      const id = `t${gi}`;
      const li = document.createElement("li");
      li.className = "topic";
      li.dataset.id = id;
      li.dataset.search = text.toLowerCase();
      const checked = state[id] ? "checked" : "";
      if (state[id]) li.classList.add("done");
      const turl = LINKS[gi];
      const labelHtml = turl
        ? `<a class="tlink" href="${turl}">${text}</a> <span class="pin" title="Open tutorial">📖</span>`
        : `<label for="${id}">${text}</label>`;
      li.innerHTML = `
        <input type="checkbox" id="${id}" ${checked}>
        <span class="idx">${gi}.</span>
        ${labelHtml}`;
      ul.appendChild(li);
    });
    body.appendChild(ul);
  });

  section.appendChild(body);
  content.appendChild(section);
});

// interactions
content.addEventListener("change", e=>{
  if (e.target.type !== "checkbox") return;
  const id = e.target.id;
  const li = e.target.closest(".topic");
  if (e.target.checked){ state[id] = 1; li.classList.add("done"); }
  else { delete state[id]; li.classList.remove("done"); }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  refresh();
});

function refresh(){
  const done = Object.keys(state).length;
  $("#doneCount").textContent = done;
  $("#totalCount").textContent = totalTopics;
  const pct = totalTopics ? Math.round(done/totalTopics*100) : 0;
  $("#barFill").style.width = pct + "%";
  $("#pctLabel").textContent = pct + "%";
  document.querySelectorAll("section.sec").forEach(section=>{
    const boxes = section.querySelectorAll("input[type=checkbox]");
    const d = [...boxes].filter(b=>b.checked).length;
    section.querySelector("[data-secdone]").textContent = `${d} / ${boxes.length}`;
  });
}

$("#expandAll").onclick = ()=> document.querySelectorAll("section.sec").forEach(s=>s.classList.remove("collapsed"));
$("#collapseAll").onclick = ()=> document.querySelectorAll("section.sec").forEach(s=>s.classList.add("collapsed"));

let hideDone = false;
$("#hideDone").onclick = function(){
  hideDone = !hideDone;
  this.textContent = hideDone ? "Show done" : "Hide done";
  applyFilter();
};

$("#search").addEventListener("input", applyFilter);
function applyFilter(){
  const q = $("#search").value.trim().toLowerCase();
  document.querySelectorAll("li.topic").forEach(li=>{
    const matchQ = !q || li.dataset.search.includes(q);
    const matchDone = !hideDone || !li.classList.contains("done");
    li.classList.toggle("hidden", !(matchQ && matchDone));
  });
  document.querySelectorAll("section.sec").forEach(section=>{
    const anyVisible = [...section.querySelectorAll("li.topic")].some(li=>!li.classList.contains("hidden"));
    section.classList.toggle("hidden", !anyVisible);
  });
}

$("#reset").onclick = ()=>{
  if(!confirm("Reset all progress for this project?")) return;
  state = {};
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll("input[type=checkbox]").forEach(b=>b.checked=false);
  document.querySelectorAll("li.topic").forEach(li=>li.classList.remove("done"));
  refresh();
};

refresh();
</script>
</body>
</html>
