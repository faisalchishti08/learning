<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring for Apache Pulsar — Every Micro-Topic Checklist</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2430; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e; --accent:#6db33f; --accent2:#34804f;
    --done:#3fb950; --bar-bg:#21262d; --chip:#21262d;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
  }
  header{
    position:sticky; top:0; z-index:50; background:rgba(13,17,23,.92);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--border); padding:14px 20px;
  }
  .title{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
  .title h1{font-size:20px; margin:0}
  .home{font-size:13px; color:var(--muted); text-decoration:none; border:1px solid var(--border); padding:5px 10px; border-radius:8px}
  .home:hover{border-color:var(--accent); color:var(--text)}
  .logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));
        display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
  .stats{margin-left:auto; font-size:13px; color:var(--muted)}
  .stats b{color:var(--accent)}
  .sub{margin:6px 0 0; font-size:13px; color:var(--muted)}
  .progress-wrap{margin-top:10px; display:flex; align-items:center; gap:12px}
  .bar{flex:1; height:10px; background:var(--bar-bg); border-radius:99px; overflow:hidden}
  .bar > span{display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--done)); transition:width .35s}
  .pct{font-size:13px; color:var(--muted); min-width:42px; text-align:right}
  .toolbar{margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center}
  .toolbar input[type=search]{
    flex:1; min-width:180px; background:var(--panel2); border:1px solid var(--border); color:var(--text);
    padding:8px 12px; border-radius:8px; font-size:14px;
  }
  button{
    background:var(--chip); border:1px solid var(--border); color:var(--text);
    padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer;
  }
  button:hover{border-color:var(--accent)}
  .danger:hover{border-color:#f85149; color:#f85149}
  main{max-width:1040px; margin:0 auto; padding:20px}
  .toc{
    background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px 18px; margin-bottom:22px;
  }
  .toc h2{margin:0 0 10px; font-size:15px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .toc ul{list-style:none; margin:0; padding:0; columns:2; column-gap:24px}
  .toc li{margin:4px 0; break-inside:avoid}
  .toc a{color:var(--text); text-decoration:none; font-size:14px}
  .toc a:hover{color:var(--accent)}
  .toc .mini{color:var(--muted); font-size:12px}
  @media(max-width:640px){.toc ul{columns:1}}

  section.sec{margin-bottom:18px; border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--panel)}
  .sec-head{
    display:flex; align-items:center; gap:12px; padding:14px 18px; cursor:pointer; user-select:none;
    background:var(--panel2);
  }
  .sec-head:hover{background:#222b38}
  .sec-head .vname{font-size:16px; font-weight:700}
  .sec-head .vtag{font-size:11px; color:var(--muted); background:var(--bar-bg); padding:2px 8px; border-radius:99px}
  .sec-head .vcount{margin-left:auto; font-size:12px; color:var(--muted)}
  .sec-head .chev{transition:transform .2s; color:var(--muted)}
  section.sec.collapsed .chev{transform:rotate(-90deg)}
  section.sec.collapsed .sec-body{display:none}
  .sec-body{padding:6px 10px 14px}
  .grp{margin:14px 8px 4px; font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--accent); font-weight:700;
       border-top:1px solid var(--border); padding-top:12px}
  .grp:first-child{border-top:none; padding-top:4px}
  ul.topics{list-style:none; margin:0; padding:0}
  li.topic{
    display:flex; align-items:flex-start; gap:10px; padding:6px 10px; border-radius:8px;
  }
  li.topic:hover{background:var(--panel2)}
  li.topic input{margin-top:3px; width:16px; height:16px; accent-color:var(--done); cursor:pointer; flex:none}
  li.topic .idx{color:var(--muted); font-variant-numeric:tabular-nums; font-size:13px; min-width:52px; flex:none}
  li.topic label{cursor:pointer; font-size:14.5px}
  li.topic.done label{color:var(--muted); text-decoration:line-through}
  li.topic .tlink{color:var(--text);text-decoration:none;border-bottom:1px dotted var(--accent);font-size:14.5px}
  li.topic .tlink:hover{color:var(--accent)}
  li.topic .pin{font-size:11px;opacity:.55;flex:none}
  li.topic.done .tlink{color:var(--muted);text-decoration:line-through}
  code{background:var(--bar-bg); padding:1px 5px; border-radius:5px; font-size:13px; color:#79c0ff}
  .hidden{display:none !important}
  footer{text-align:center; color:var(--muted); font-size:12px; padding:24px}
  .back-top{position:fixed; right:18px; bottom:18px; opacity:.85}
</style>
</head>
<body>
<header>
  <div class="title">
    <div class="logo">P</div>
    <h1>Spring for Apache Pulsar</h1>
    <a class="home" href="index.html">All projects ↗</a>
    <div class="stats"><b id="doneCount">0</b> / <span id="totalCount">0</span> topics</div>
  </div>
  <p class="sub">Spring-friendly building blocks for Apache Pulsar messaging.</p>
  <div class="progress-wrap">
    <div class="bar"><span id="barFill"></span></div>
    <div class="pct" id="pctLabel">0%</div>
  </div>
  <div class="toolbar">
    <input type="search" id="search" placeholder="Search topics…">
    <button id="expandAll">Expand all</button>
    <button id="collapseAll">Collapse all</button>
    <button id="hideDone">Hide done</button>
    <button id="reset" class="danger">Reset progress</button>
  </div>
</header>

<main>
  <div class="toc">
    <h2>Index — jump to section</h2>
    <ul id="tocList"></ul>
  </div>
  <div id="content"></div>
  <footer>
    Progress saved automatically in your browser (localStorage). Single self-contained file — works offline.
  </footer>
</main>
<button class="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Top</button>

<script>
const STORAGE_KEY = "spring-checklist:spring-for-apache-pulsar.html";
const DATA = [
{
"name": "1. Core Pulsar Support",
"tag": "core",
"groups": [
{
"g": "Producing & Consuming",
"items": [
"Apache Pulsar concepts (topics, subscriptions, tenants, namespaces)",
"PulsarClient configuration",
"PulsarTemplate",
"Sending messages (send / sendAsync)",
"Message routing & partitioning",
"@PulsarListener",
"@EnablePulsar",
"Subscription types (exclusive, shared, failover, key_shared)",
"Acknowledgment modes",
"Batch listeners",
"PulsarConsumerFactory / PulsarProducerFactory",
"PulsarReader & @PulsarReader"
]
},
{
"g": "Schema & Serialization",
"items": [
"Pulsar schema support (primitive, JSON, Avro, Protobuf, KeyValue)",
"Custom schema resolution",
"Schema auto-detection",
"Message key/value schemas"
]
}
]
},
{
"name": "2. Advanced",
"tag": "adv",
"groups": [
{
"g": "Advanced Features",
"items": [
"Dead letter topics & redelivery",
"Negative acknowledgment & retry",
"Message TTL & delayed delivery",
"Pulsar transactions",
"Reactive Pulsar support (ReactivePulsarTemplate / @ReactivePulsarListener)",
"Pulsar admin & auto topic creation",
"Error handling",
"Observability (Micrometer)",
"Spring Boot auto-configuration",
"Pulsar Functions (concepts)",
"Testing support"
]
}
]
}
];
const LINKS = {};

const $ = (s,el=document)=>el.querySelector(s);
const content = $("#content");
const tocList = $("#tocList");
let state = {};
try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch(e){ state = {}; }

let totalTopics = 0;
let gi = 0; // global sequential index

DATA.forEach((sec, si)=>{
  let secCount = 0;
  DATA[si]._items = [];
  sec.groups.forEach(grp => grp.items.forEach(()=>{ secCount++; }));
  DATA[si]._count = secCount;
  totalTopics += secCount;
});

// TOC
DATA.forEach((sec, si)=>{
  const li = document.createElement("li");
  li.innerHTML = `<a href="#sec-${si}">${sec.name}</a> <span class="mini">(${sec._count})</span>`;
  tocList.appendChild(li);
});

// Sections
DATA.forEach((sec, si)=>{
  const section = document.createElement("section");
  section.className = "sec";
  section.id = `sec-${si}`;

  const head = document.createElement("div");
  head.className = "sec-head";
  head.innerHTML = `
    <span class="chev">▾</span>
    <span class="vname">${sec.name}</span>
    ${sec.tag ? `<span class="vtag">${sec.tag}</span>` : ""}
    <span class="vcount" data-secdone>0 / ${sec._count}</span>`;
  head.addEventListener("click", ()=> section.classList.toggle("collapsed"));
  section.appendChild(head);

  const body = document.createElement("div");
  body.className = "sec-body";

  sec.groups.forEach(grp=>{
    const g = document.createElement("div");
    g.className = "grp";
    g.textContent = grp.g;
    body.appendChild(g);

    const ul = document.createElement("ul");
    ul.className = "topics";
    grp.items.forEach(text=>{
      gi++;
      const id = `t${gi}`;
      const li = document.createElement("li");
      li.className = "topic";
      li.dataset.id = id;
      li.dataset.search = text.toLowerCase();
      const checked = state[id] ? "checked" : "";
      if (state[id]) li.classList.add("done");
      const turl = LINKS[gi];
      const labelHtml = turl
        ? `<a class="tlink" href="${turl}">${text}</a> <span class="pin" title="Open tutorial">📖</span>`
        : `<label for="${id}">${text}</label>`;
      li.innerHTML = `
        <input type="checkbox" id="${id}" ${checked}>
        <span class="idx">${gi}.</span>
        ${labelHtml}`;
      ul.appendChild(li);
    });
    body.appendChild(ul);
  });

  section.appendChild(body);
  content.appendChild(section);
});

// interactions
content.addEventListener("change", e=>{
  if (e.target.type !== "checkbox") return;
  const id = e.target.id;
  const li = e.target.closest(".topic");
  if (e.target.checked){ state[id] = 1; li.classList.add("done"); }
  else { delete state[id]; li.classList.remove("done"); }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  refresh();
});

function refresh(){
  const done = Object.keys(state).length;
  $("#doneCount").textContent = done;
  $("#totalCount").textContent = totalTopics;
  const pct = totalTopics ? Math.round(done/totalTopics*100) : 0;
  $("#barFill").style.width = pct + "%";
  $("#pctLabel").textContent = pct + "%";
  document.querySelectorAll("section.sec").forEach(section=>{
    const boxes = section.querySelectorAll("input[type=checkbox]");
    const d = [...boxes].filter(b=>b.checked).length;
    section.querySelector("[data-secdone]").textContent = `${d} / ${boxes.length}`;
  });
}

$("#expandAll").onclick = ()=> document.querySelectorAll("section.sec").forEach(s=>s.classList.remove("collapsed"));
$("#collapseAll").onclick = ()=> document.querySelectorAll("section.sec").forEach(s=>s.classList.add("collapsed"));

let hideDone = false;
$("#hideDone").onclick = function(){
  hideDone = !hideDone;
  this.textContent = hideDone ? "Show done" : "Hide done";
  applyFilter();
};

$("#search").addEventListener("input", applyFilter);
function applyFilter(){
  const q = $("#search").value.trim().toLowerCase();
  document.querySelectorAll("li.topic").forEach(li=>{
    const matchQ = !q || li.dataset.search.includes(q);
    const matchDone = !hideDone || !li.classList.contains("done");
    li.classList.toggle("hidden", !(matchQ && matchDone));
  });
  document.querySelectorAll("section.sec").forEach(section=>{
    const anyVisible = [...section.querySelectorAll("li.topic")].some(li=>!li.classList.contains("hidden"));
    section.classList.toggle("hidden", !anyVisible);
  });
}

$("#reset").onclick = ()=>{
  if(!confirm("Reset all progress for this project?")) return;
  state = {};
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll("input[type=checkbox]").forEach(b=>b.checked=false);
  document.querySelectorAll("li.topic").forEach(li=>li.classList.remove("done"));
  refresh();
};

refresh();
</script>
</body>
</html>
